{% extends "base.html" %}

{% block title %}Dashboard — Trade Indicator{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] px-4">
    <div class="text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-6"
             style="background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.2);">
            <span class="text-3xl">📈</span>
        </div>
        <h1 class="text-3xl font-bold text-white mb-3">
            Bem-vindo, {{ user.email|default:"Trader" }}!
        </h1>
        <p class="text-slate-400 mb-8">
            O Dashboard completo será implementado na Sprint 3.
        </p>
        <a href="{% url 'account_logout' %}"
           class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-medium text-slate-300
                  border border-slate-700 hover:border-red-500 hover:text-red-400 transition-all duration-200">
            Sair
        </a>
    </div>
</div>
{% endblock %}
